swagger: "2.0"
info:
    title: Mailing List Service
    description: Service for proxying GroupsIO operations to the ITX API
    version: 0.0.1
host: localhost:80
consumes:
    - application/json
    - application/xml
    - application/gob
produces:
    - application/json
    - application/xml
    - application/gob
paths:
    /groupsio/checksubscriber:
        post:
            tags:
                - mailing-list
            summary: check-groupsio-subscriber mailing-list
            description: Check if an email address is subscribed to a GroupsIO subgroup
            operationId: mailing-list#check-groupsio-subscriber
            parameters:
                - name: Authorization
                  in: header
                  description: JWT token issued by Heimdall
                  required: false
                  type: string
                - name: Check-Groupsio-SubscriberRequestBody
                  in: body
                  required: true
                  schema:
                    $ref: '#/definitions/MailingListCheckGroupsioSubscriberRequestBody'
                    required:
                        - email
                        - subgroup_id
            responses:
                "200":
                    description: OK response.
                    schema:
                        $ref: '#/definitions/GroupsioCheckSubscriberResponse'
                        required:
                            - subscribed
                "400":
                    description: Bad Request response.
                    schema:
                        $ref: '#/definitions/BadRequestError'
                        required:
                            - message
                "500":
                    description: Internal Server Error response.
                    schema:
                        $ref: '#/definitions/InternalServerError'
                        required:
                            - message
                "503":
                    description: Service Unavailable response.
                    schema:
                        $ref: '#/definitions/ServiceUnavailableError'
                        required:
                            - message
            schemes:
                - http
            security:
                - jwt_header_Authorization: []
