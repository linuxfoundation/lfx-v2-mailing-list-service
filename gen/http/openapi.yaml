                  in: body
                  required: true
                  schema:
                    $ref: '#/definitions/MailingListCheckGroupsioSubscriberRequestBody'
                    required:
                        - email
                        - subgroup_id
            responses:
                "200":
                    description: OK response.
                    schema:
                        $ref: '#/definitions/GroupsioCheckSubscriberResponse'
                        required:
                            - subscribed
                "400":
                    description: Bad Request response.
                    schema:
                        $ref: '#/definitions/BadRequestError'
                        required:
                            - message
                "500":
                    description: Internal Server Error response.
                    schema:
                        $ref: '#/definitions/InternalServerError'
                        required:
                            - message
                "503":
                    description: Service Unavailable response.
                    schema:
                        $ref: '#/definitions/ServiceUnavailableError'
                        required:
                            - message
            schemes:
                - http
            security:
                - jwt_header_Authorization: []
