            tags:
                - mailing-list
            summary: list-groupsio-mailing-lists mailing-list
            description: List GroupsIO subgroups, optionally filtered by project UID and/or committee UID
            operationId: mailing-list#list-groupsio-mailing-lists
            parameters:
                - name: project_uid
                  in: query
                  description: LFX v2 project UID filter
                  required: false
                  type: string
                  format: uuid
                - name: committee_uid
                  in: query
                  description: LFX v2 committee UID filter
                  required: false
                  type: string
                  format: uuid
                - name: Authorization
                  in: header
                  description: JWT token issued by Heimdall
                  required: false
                  type: string
            responses:
